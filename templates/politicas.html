<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Políticas y Términos - GlobalCopyPlot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(160deg, #F5F0E1 0%, #FFFFFF 70%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.8;
        }
        .btn-back {
            background: var(--azul-claro, #5B9BD5);
            color: white;
            border-radius: 25px;
            padding: 8px 20px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 20px;
        }
        .btn-back:hover { background: var(--azul-oscuro, #2F5496); color: white; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2 class="fw-bold mb-4" style="color: var(--azul-oscuro, #2F5496);">Políticas y Términos</h2>
        <div style="white-space: pre-wrap; font-size: 1rem; color: #333;">{{ texto }}</div>
        <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
